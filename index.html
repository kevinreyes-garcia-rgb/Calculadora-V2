<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica — Negra & Morada ✨</title>
    <style>
        :root {
            --bg1: #0a0a0f;
            --bg2: #1a0f2e;
            --card: rgba(30, 20, 50, 0.85);
            --glass: rgba(45, 30, 80, 0.6);
            --accent: #8b5cf6;
            --accent2: #c026d3;
            --text: #e0d4ff;
            --text-light: #a78bfa;
            --btn-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            --radius: 18px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 20%, rgba(139, 92, 246, 0.15), transparent 50%),
                        linear-gradient(135deg, var(--bg1), var(--bg2));
            color: var(--text);
            overflow: hidden;
        }

        .wrapper {
            width: 400px;
            max-width: 96vw;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            backdrop-filter: blur(16px);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        header {
            padding: 20px 20px 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(20, 10, 40, 0.6);
        }

        .logo {
            width: 58px;
            height: 58px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 24px;
            box-shadow: var(--btn-shadow);
        }

        .title h1 {
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .title p {
            font-size: 13px;
            color: var(--text-light);
            opacity: 0.9;
        }

        .screen {
            padding: 20px;
            background: linear-gradient(180deg, rgba(20, 15, 45, 0.8), rgba(15, 10, 35, 0.7));
        }

        .display {
            background: var(--glass);
            padding: 18px;
            border-radius: 14px;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        .expression {
            font-size: 15px;
            color: var(--text-light);
            opacity: 0.85;
            word-break: break-all;
            max-width: 100%;
            text-align: right;
        }

        .result {
            font-size: 28px;
            font-weight: 700;
            color: #f0e6ff;
        }

        .pad {
            padding: 18px;
            background: rgba(20, 15, 45, 0.7);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        button.btn {
            border: 0;
            padding: 14px 8px;
            border-radius: 14px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: var(--btn-shadow);
            transition: all 0.1s ease;
            font-weight: 500;
        }

        button.btn:active {
            transform: translateY(3px) scale(0.95);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .btn-fn {
            background: linear-gradient(135deg, #2a1f4d, #1f1638);
            color: #c4b5fd;
        }

        .btn-num {
            background: linear-gradient(135deg, #3b2a66, #2a1f4d);
            color: #e0d4ff;
        }

        .btn-op {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-weight: 700;
        }

        .btn-accent {
            background: linear-gradient(135deg, #6d28d9, #a855f7);
            color: white;
        }

        .span2 { grid-column: span 2; }

        footer {
            padding: 14px;
            font-size: 12.5px;
            color: #9f8ef0;
            text-align: center;
            background: rgba(15, 10, 35, 0.6);
        }

        /* Decorative shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.12;
            pointer-events: none;
            z-index: -1;
        }
        .shape.a { width: 280px; height: 280px; left: -80px; top: -80px; background: linear-gradient(#8b5cf6, #c026d3); }
        .shape.b { width: 220px; height: 220px; right: -70px; bottom: -50px; background: linear-gradient(#6d28d9, #a855f7); }
    </style>
</head>
<body>
    <div class="shape a"></div>
    <div class="shape b"></div>

    <div class="wrapper" role="application" aria-label="Calculadora científica negra y morada">
        <header>
            <div class="logo">ψ</div>
            <div class="title">
                <h1>Calculadora Científica</h1>
                <p>Negra & Morada • Elegante y potente ✨</p>
            </div>
            <div style="font-size:13px;color:#a78bfa">v1.1</div>
        </header>

        <div class="screen">
            <div class="display">
                <div id="expression" class="expression">0</div>
                <div id="result" class="result">0</div>
            </div>
        </div>

        <div class="pad" id="pad">
            <!-- Row 1 -->
            <button class="btn btn-fn" data-action="clear">AC</button>
            <button class="btn btn-fn" data-action="back">⌫</button>
            <button class="btn btn-fn" data-value="%">%</button>
            <button class="btn btn-fn" data-value="(">(</button>
            <button class="btn btn-fn" data-value=")">)</button>

            <!-- Row 2 -->
            <button class="btn btn-fn" data-value="sin(">sin</button>
            <button class="btn btn-fn" data-value="cos(">cos</button>
            <button class="btn btn-fn" data-value="tan(">tan</button>
            <button class="btn btn-fn" data-value="^">^</button>
            <button class="btn btn-op" data-action="eval">=</button>

            <!-- Row 3 -->
            <button class="btn btn-fn" data-value="ln(">ln</button>
            <button class="btn btn-fn" data-value="log10(">log</button>
            <button class="btn btn-fn" data-value="sqrt(">√</button>
            <button class="btn btn-fn" data-value="fact(">n!</button>
            <button class="btn btn-accent" data-value="pi">π</button>

            <!-- Row 4 -->
            <button class="btn btn-num" data-value="7">7</button>
            <button class="btn btn-num" data-value="8">8</button>
            <button class="btn btn-num" data-value="9">9</button>
            <button class="btn btn-fn" data-value="/">÷</button>
            <button class="btn btn-accent" data-value="e">e</button>

            <!-- Row 5 -->
            <button class="btn btn-num" data-value="4">4</button>
            <button class="btn btn-num" data-value="5">5</button>
            <button class="btn btn-num" data-value="6">6</button>
            <button class="btn btn-fn" data-value="*">×</button>
            <button class="btn btn-fn" data-value="exp(">exp</button>

            <!-- Row 6 -->
            <button class="btn btn-num" data-value="1">1</button>
            <button class="btn btn-num" data-value="2">2</button>
            <button class="btn btn-num" data-value="3">3</button>
            <button class="btn btn-fn" data-value="-">−</button>
            <button class="btn btn-fn" data-value="^2">x²</button>

            <!-- Row 7 -->
            <button class="btn btn-num span2" data-value="0">0</button>
            <button class="btn btn-num" data-value=".">.</button>
            <button class="btn btn-fn" data-value="+">+</button>
            <button class="btn btn-fn" data-action="ans">ANS</button>
        </div>

        <footer>Usa el teclado o los botones. ¡Diseño mejorado en negro y morado! 😊</footer>
    </div>

    <script>
        const exprEl = document.getElementById('expression');
        const resEl = document.getElementById('result');
        let expr = '';
        let lastAns = 0;

        function updateDisplay() {
            exprEl.textContent = expr || '0';
            resEl.textContent = expr ? tryEvalPreview(expr) : '0';
        }

        function safeReplace(s) {
            return s.replace(/÷/g, '/').replace(/×/g, '*').replace(/−/g, '-').replace(/π/g, 'pi');
        }

        function tryEvalPreview(s) {
            try {
                const val = evaluateExpression(s);
                if (val === undefined || val === null) return '';
                if (Math.abs(val) > 1e12) return val.toExponential(6);
                return Number.isInteger(val) ? String(val) : String(Number(val.toFixed(10))).replace(/\.0+$/, '');
            } catch (e) {
                return '';
            }
        }

        function evaluateExpression(s) {
            if (!s) return 0;
            s = safeReplace(s);

            // Reemplazos básicos
            s = s.replace(/pi/g, '(' + Math.PI + ')');
            s = s.replace(/e/g, '(' + Math.E + ')');
            s = s.replace(/\^/g, '**');

            // Funciones matemáticas
            s = s.replace(/\b(sin|cos|tan|asin|acos|atan|sqrt|exp)\(/g, 'Math.$1(');
            s = s.replace(/\bln\(/g, 'Math.log(');
            s = s.replace(/\blog10\(/g, 'Math.log10(');

            // Factorial
            const fact = (n) => {
                n = Math.floor(Number(n));
                if (n < 0) throw new Error('Factorial negativo');
                if (n === 0 || n === 1) return 1;
                let r = 1;
                for (let i = 2; i <= n; i++) r *= i;
                return r;
            };

            // Evaluación segura
            const fn = new Function('Math', 'fact', 'lastAns', 'return (' + s + ')');
            return fn(Math, fact, lastAns);
        }

        // Manejo de botones
        document.getElementById('pad').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;

            const val = btn.getAttribute('data-value');
            const action = btn.getAttribute('data-action');

            if (action === 'clear') {
                expr = '';
                lastAns = 0;
                updateDisplay();
                return;
            }
            if (action === 'back') {
                expr = expr.slice(0, -1);
                updateDisplay();
                return;
            }
            if (action === 'eval') {
                try {
                    const value = evaluateExpression(expr);
                    lastAns = value;
                    expr = String(value);
                    updateDisplay();
                } catch (err) {
                    resEl.textContent = 'Error';
                }
                return;
            }
            if (action === 'ans') {
                expr += String(lastAns);
                updateDisplay();
                return;
            }

            if (val) {
                if (val === 'pi' || val === 'e') expr += val;
                else if (val === '^2') expr += '**2';
                else expr += val;
                updateDisplay();
            }
        });

        // Soporte de teclado
        window.addEventListener('keydown', (e) => {
            if (/[0-9\.\+\-\*\/\(\)\^]/.test(e.key)) {
                if (e.key === '^') expr += '^';
                else expr += e.key;
                updateDisplay();
                e.preventDefault();
            }
            if (e.key === 'Enter') {
                e.preventDefault();
                try {
                    const v = evaluateExpression(expr);
                    lastAns = v;
                    expr = String(v);
                    updateDisplay();
                } catch (err) {
                    resEl.textContent = 'Error';
                }
            }
            if (e.key === 'Backspace') {
                expr = expr.slice(0, -1);
                updateDisplay();
            }
            // Atajos rápidos
            if (e.key.toLowerCase() === 's') { expr += 'sin('; updateDisplay(); }
            if (e.key.toLowerCase() === 'c') { expr += 'cos('; updateDisplay(); }
            if (e.key.toLowerCase() === 't') { expr += 'tan('; updateDisplay(); }
        });

        // Inicializar
        updateDisplay();
    </script>
</body>
</html>
